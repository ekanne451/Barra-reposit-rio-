<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    text-decoration: none;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar{
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f5f5f5;
    padding: 15px 40px;
    border-radius: 20px;
}

/* LOGO */
.logo img{
    height: 40px;
    display: block;
}

/* MENU */
.nav-links{
    display: flex;
    list-style: none;
    gap: 30px;
}

.nav-links a{
    color: #777;
    font-size: 18px;
    font-weight: 600;
}

/* ITEM ATIVO */
.nav-links a.active{
    color: black;
    font-weight: bold;
    position: relative;
}

.nav-links a.active::after{
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 100%;
    height: 3px;
    background: red;
    border-radius: 2px;
}
</style>

</head>

<body>

<nav class="navbar">

    <!-- LOGO -->
    <div class="logo">
        <a href="#">
            <img src="logo-logo.png" alt="Logo"></a>
    </div>

    <!-- MENU -->
    <ul class="nav-links">
        <li><a href="#" class="active">Explorar</a></li>
        <li><a href="#">Planejar</a></li>
        <li><a href="#">Cultura</a></li>
    </ul>

</nav>

</body>
</html>
